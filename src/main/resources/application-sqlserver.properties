# =============================================================================
# SQL Server Profile Configuration
# =============================================================================
# Activate with: mvn spring-boot:run -Dspring-boot.run.profiles=sqlserver
#            or: java -jar app.jar --spring.profiles.active=sqlserver
#
# Requires a running SQL Server instance. See docker-compose.yml for local dev.
# =============================================================================

# --- Data Source ---
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=outfront_oms;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=${MSSQL_SA_PASSWORD:YourStrong@Passw0rd}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- Disable H2 Console (not needed with SQL Server) ---
spring.h2.console.enabled=false

# --- Connection Pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
