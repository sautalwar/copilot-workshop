# =============================================================================
# Secret Scanning Workflow (using Gitleaks)
# =============================================================================
#
# PURPOSE:
#   Scans your entire Git history and current code for accidentally committed
#   secrets: API keys, passwords, tokens, connection strings, private keys,
#   and other sensitive credentials.
#
# WHY THIS MATTERS:
#   A single leaked secret can lead to:
#   - Unauthorized access to AWS resources (leaked AWS keys)
#   - Database breaches (leaked JDBC connection strings)
#   - Account takeover (leaked OAuth tokens)
#   - Financial damage (leaked payment API keys)
#   - Compliance violations (HIPAA, SOC2, PCI-DSS)
#
#   Once a secret is in Git history, it's there FOREVER (even if you delete
#   the file) — unless you rewrite history. Prevention is critical.
#
# WHAT GITLEAKS CATCHES:
#   - AWS access keys and secret keys
#   - GitHub personal access tokens
#   - JDBC/database connection strings with passwords
#   - Private keys (RSA, SSH, PGP)
#   - Generic API keys and tokens
#   - OAuth client secrets
#   - Slack webhooks and tokens
#   - Azure/GCP service account keys
#   - Spring Boot application.properties with credentials
#   - .env file secrets
#
# WHY GITLEAKS + GITHUB SECRET SCANNING?
#   GitHub's native Secret Scanning (if available with GHAS) partners with
#   service providers to auto-revoke leaked tokens. Gitleaks complements this by:
#   1. Catching custom/internal secret patterns GitHub doesn't know about
#   2. Working without GHAS license (free and open-source)
#   3. Supporting custom rules via .gitleaks.toml
#   4. Scanning the full Git history (not just current files)
#
# =============================================================================

name: Secret Scanning

on:
  push:
    branches: [main]
    # Scan every push to main. If a secret somehow gets merged, we detect
    # it immediately and can trigger incident response.

  pull_request:
    branches: [main]
    # Scan every PR before merge. This is the primary prevention mechanism —
    # block the PR if secrets are found, before they enter the main branch.

jobs:
  gitleaks:
    name: Scan for Secrets
    runs-on: ubuntu-latest

    steps:
      # --- STEP 1: Checkout with full history ---
      # fetch-depth: 0 clones the ENTIRE Git history, not just the latest
      # commit. This is critical because secrets might have been committed
      # and then "deleted" — they're still in the history.
      #
      # Without full history, Gitleaks can only scan current files and would
      # miss secrets that were committed and removed in past commits.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- STEP 2: Run Gitleaks ---
      # The gitleaks-action scans the repository using the gitleaks binary.
      # It uses the .gitleaks.toml config file (if present) for custom rules
      # and allowlists.
      #
      # On a pull_request event, it scans only the commits in the PR (faster).
      # On a push event, it scans the pushed commits.
      #
      # If secrets are found:
      #   - The workflow fails (exit code 1)
      #   - Details appear in the Actions log
      #   - The PR is blocked (if branch protection requires this check)
      #
      # GITHUB_TOKEN is required for the action to post results as PR comments
      # and to create SARIF reports for the Security tab.
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =============================================================================
# WHAT TO DO WHEN A SECRET IS FOUND
# =============================================================================
#
# 1. DON'T PANIC — but act FAST
#
# 2. ROTATE THE SECRET IMMEDIATELY
#    - Generate a new secret/key/password
#    - Update it in your secret management system (AWS Secrets Manager, etc.)
#    - Verify the new secret works
#
# 3. REVOKE THE OLD SECRET
#    - Disable/delete the compromised credential
#    - For AWS: deactivate the access key in IAM
#    - For GitHub: revoke the personal access token
#    - For databases: change the password and force disconnect sessions
#
# 4. CHECK AUDIT LOGS
#    - Review CloudTrail (AWS), audit logs (GitHub), access logs (databases)
#    - Look for unauthorized usage during the exposure window
#
# 5. PREVENT RECURRENCE
#    - Add the secret pattern to .gitleaks.toml allowlist (if it's a false positive)
#    - Use environment variables or a secrets manager instead of hardcoding
#    - Add pre-commit hooks (see below)
#    - Update .gitignore to exclude files that commonly contain secrets
#
# 6. PRE-COMMIT HOOK (optional — prevents secrets from even being committed)
#    Install gitleaks locally:
#      brew install gitleaks  (macOS)
#      choco install gitleaks (Windows)
#    Add to .git/hooks/pre-commit:
#      #!/bin/sh
#      gitleaks protect --staged
#
# =============================================================================
# CUSTOMIZATION
# =============================================================================
#
# To customize what Gitleaks scans for, create a .gitleaks.toml file in the
# repo root. See the .gitleaks.toml file in this repository for an example
# with custom rules for Java/Spring Boot patterns.
#
# To suppress false positives in specific files:
#   Add a comment: // gitleaks:allow
#   Or add the finding to the .gitleaks.toml allowlist
#
# =============================================================================
