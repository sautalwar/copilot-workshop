name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Docker Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/copilot-workshop:${{ github.sha }} .
        docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/copilot-workshop:${{ github.sha }}
        docker tag ${{ secrets.REGISTRY_LOGIN_SERVER }}/copilot-workshop:${{ github.sha }} ${{ secrets.REGISTRY_LOGIN_SERVER }}/copilot-workshop:latest
        docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/copilot-workshop:latest

    - name: Deploy to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        appSourceUrl: ${{ github.server_url }}/${{ github.repository }}
        acrName: ${{ secrets.REGISTRY_LOGIN_SERVER }}
        acrUsername: ${{ secrets.REGISTRY_USERNAME }}
        acrPassword: ${{ secrets.REGISTRY_PASSWORD }}
        containerAppName: copilot-workshop
        resourceGroup: ${{ secrets.RESOURCE_GROUP }}
        imageToDeploy: ${{ secrets.REGISTRY_LOGIN_SERVER }}/copilot-workshop:latest
