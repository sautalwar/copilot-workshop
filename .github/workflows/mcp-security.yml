# =============================================================================
# MCP Server Security Check Workflow
# =============================================================================
#
# PURPOSE:
#   MCP (Model Context Protocol) servers are powerful — they give Copilot and
#   other AI agents the ability to access external systems: Jira, databases,
#   APIs, file systems, and more.
#
#   This power comes with risk. Without guardrails, an MCP server can:
#   - Leak sensitive data from Jira/databases to AI responses
#   - Allow prompt injection to execute unauthorized operations
#   - Contain hardcoded credentials that get committed to Git
#   - Have vulnerable npm dependencies
#   - Escalate privileges beyond what's intended
#
# WHAT THIS WORKFLOW DOES:
#   1. Audits npm dependencies for known vulnerabilities
#   2. Scans for hardcoded secrets (passwords, API keys)
#   3. Validates the server can start without errors
#
# WHEN IT RUNS:
#   Only when files in the mcp-server/ directory change.
#   This keeps CI fast — no need to run MCP checks when only Java code changes.
#
# =============================================================================

name: MCP Server Security Check

on:
  push:
    paths:
      - 'mcp-server/**'
      # Only trigger when MCP server files change.
      # This includes: source code, package.json, config files, etc.
  pull_request:
    paths:
      - 'mcp-server/**'

jobs:
  mcp-security:
    name: MCP Server Validation
    runs-on: ubuntu-latest

    # --- WORKING DIRECTORY ---
    # All `run` commands execute inside the mcp-server/ directory.
    # This avoids prefixing every command with `cd mcp-server &&`.
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      # --- Node.js Setup ---
      # MCP servers typically run on Node.js. We use Node 20 (LTS).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- Install Dependencies ---
      # `npm ci` (clean install) is preferred over `npm install` in CI:
      #   - Uses exact versions from package-lock.json (deterministic)
      #   - Deletes node_modules first (clean state)
      #   - Fails if package-lock.json is out of sync with package.json
      #   - Faster than npm install
      - name: Install dependencies
        run: npm ci

      # --- Dependency Audit ---
      # `npm audit` checks all installed packages against the npm advisory
      # database for known vulnerabilities.
      #
      # --audit-level=moderate: Fail the build if there are vulnerabilities
      # rated "moderate" or higher. Options:
      #   - low: fails on everything (very noisy)
      #   - moderate: good balance (recommended)
      #   - high: only fails on high/critical (too lenient for security-sensitive code)
      #   - critical: only fails on critical (not recommended)
      #
      # For MCP servers, we use "moderate" because these servers have elevated
      # privileges — they access external systems on behalf of users.
      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      # --- Hardcoded Secret Detection ---
      # This step uses grep to search for common patterns that indicate
      # hardcoded secrets. It's a simple but effective first line of defense.
      #
      # WHY NOT JUST USE GITLEAKS?
      # Gitleaks scans Git history. This step scans the current codebase
      # with patterns specific to MCP server code (JavaScript/TypeScript).
      # It catches things like:
      #   - password = "mypassword"
      #   - apiKey: "sk-abc123..."
      #   - connectionString = "jdbc:..."
      #
      # IMPORTANT: This is NOT a replacement for proper secret management.
      # Always use environment variables or a secrets manager (e.g., AWS
      # Secrets Manager, GitHub Actions secrets) for credentials.
      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Checking for hardcoded secrets in MCP server..."
          FOUND=0

          # Check for hardcoded passwords
          if grep -rn "password\s*=\s*['\"]" . --include="*.js" --include="*.ts" --include="*.json" | grep -v "node_modules" | grep -v "package-lock" | grep -v ".example"; then
            echo "::error::⚠️ Potential hardcoded password found!"
            FOUND=1
          fi

          # Check for hardcoded API keys
          if grep -rn "api[_-]\?key\s*[:=]\s*['\"][a-zA-Z0-9]" . --include="*.js" --include="*.ts" --include="*.json" | grep -v "node_modules" | grep -v "package-lock" | grep -v ".example"; then
            echo "::error::⚠️ Potential hardcoded API key found!"
            FOUND=1
          fi

          # Check for hardcoded tokens
          if grep -rn "token\s*[:=]\s*['\"][a-zA-Z0-9]" . --include="*.js" --include="*.ts" --include="*.json" | grep -v "node_modules" | grep -v "package-lock" | grep -v ".example" | grep -v "GITHUB_TOKEN" | grep -v "github-token"; then
            echo "::error::⚠️ Potential hardcoded token found!"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "❌ Hardcoded secrets detected. Use environment variables instead:"
            echo "   const apiKey = process.env.API_KEY;"
            echo "   const password = process.env.DB_PASSWORD;"
            exit 1
          fi

          echo "✅ No hardcoded secrets found"

      # --- Server Startup Validation ---
      # Verifies the MCP server can start without immediate crashes.
      # `timeout 10` kills the server after 10 seconds (it's a long-running
      # process, so we just need to verify it starts).
      #
      # The `|| true` prevents the workflow from failing when timeout kills
      # the process (exit code 124). We only care about startup errors.
      #
      # NOTE: This is a basic smoke test. For comprehensive testing, add
      # actual MCP tool call tests (e.g., test the Jira tool with mock data).
      - name: Validate MCP server starts
        run: |
          echo "🚀 Validating MCP server startup..."
          timeout 10 node index.js 2>&1 || EXIT_CODE=$?
          if [ "${EXIT_CODE:-0}" -eq 124 ]; then
            echo "✅ MCP server started successfully (killed after 10s timeout)"
          elif [ "${EXIT_CODE:-0}" -eq 0 ]; then
            echo "✅ MCP server exited cleanly"
          else
            echo "❌ MCP server failed to start (exit code: $EXIT_CODE)"
            exit 1
          fi

# =============================================================================
# MCP SECURITY BEST PRACTICES
# =============================================================================
#
# 1. INPUT VALIDATION
#    Every MCP tool should validate its inputs before using them.
#    Example: If a tool searches Jira, validate the JQL query doesn't
#    contain injection patterns.
#
# 2. RATE LIMITING
#    Limit how often tools can be called per minute/hour.
#    Without this, a prompt injection could trigger thousands of API calls.
#
# 3. AUDIT LOGGING
#    Log every tool call with: timestamp, tool name, input, output hash.
#    This creates an audit trail for security reviews.
#
# 4. RESPONSE FILTERING
#    Strip sensitive data from responses before returning to the AI:
#    - Internal IDs, employee numbers
#    - PII (email addresses, phone numbers)
#    - Infrastructure details (IP addresses, hostnames)
#
# 5. LEAST PRIVILEGE
#    The MCP server's API credentials should have MINIMUM permissions:
#    - Jira: read-only access to specific projects
#    - Database: read-only access to specific tables
#    - AWS: scoped to specific resources with read-only policies
#
# 6. ENVIRONMENT VARIABLES
#    ALL credentials must come from environment variables:
#      JIRA_API_TOKEN=...
#      DB_CONNECTION_STRING=...
#    Never hardcode. Use .env files locally (add to .gitignore!)
#    and GitHub Actions secrets in CI/CD.
#
# =============================================================================
